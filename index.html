<head>
<meta charset="UTF-8">

<meta name="mobile-web-app-capable" content="yes">

<title>IATA Delay Codes</title>
<style>
:root{
  --bg:#0b1220; --card:#141d30; --card2:#1a2540; --border:#25324e;
  --text:#e8edf6; --dim:#8fa0bc; --accent:#4da3ff; --chipbg:#16203a;
  --c10:#4da3ff; --c20:#b58cff; --c30:#ffb347; --c40:#ff6b6b; --c50:#ff8fa3;
  --c60:#5ad1b0; --c70:#7fc8ff; --c80:#ffd166; --c90:#c0cad9;
  --headerbg:rgba(11,18,32,.92);
}
@media (prefers-color-scheme: light){
  :root{
    --bg:#f4f6fa; --card:#ffffff; --card2:#eef2f8; --border:#d7deea;
    --text:#17233a; --dim:#5d6b85; --accent:#1f6fd6; --chipbg:#e7edf6;
    --c10:#1f6fd6; --c20:#7a4fd1; --c30:#c77e12; --c40:#d43f3f; --c50:#d1547a;
    --c60:#128a6b; --c70:#2589c9; --c80:#b8860b; --c90:#5d6b85;
    --headerbg:rgba(244,246,250,.92);
  }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  height:100%; overscroll-behavior-y:none}
header{position:sticky;top:0;z-index:10;background:var(--headerbg);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;border-bottom:1px solid var(--border)}
.titlebar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
h1 svg{flex:none}
.lang{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;font-size:13px;font-weight:600}
.lang button{background:transparent;color:var(--dim);border:0;padding:6px 12px;font:inherit;cursor:pointer}
.lang button.on{background:var(--accent);color:var(--bg)}
.searchwrap{position:relative}
#q{width:100%;padding:12px 40px 12px 40px;font-size:17px;border-radius:12px;
  border:1px solid var(--border);background:var(--card);color:var(--text);outline:none}
#q:focus{border-color:var(--accent)}
#q::placeholder{color:var(--dim)}
.searchwrap .mag{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
#clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:var(--border);
  color:var(--text);width:24px;height:24px;border-radius:50%;font-size:14px;line-height:1;display:none;cursor:pointer}
.chips{display:flex;gap:7px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none;-ms-overflow-style:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--border);background:var(--chipbg);color:var(--dim);
  border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;white-space:nowrap}
.chip .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.chip.on{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.chip.on .dot{background:var(--bg)}
main{padding:10px 14px calc(env(safe-area-inset-bottom) + 30px);max-width:640px;margin:0 auto}
.count{font-size:12px;color:var(--dim);margin:6px 2px 10px}
.grouphead{background:var(--card2);border:1px solid var(--border);border-radius:14px;
  padding:13px 14px;margin:10px 0 8px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.grouphead:active{background:var(--border)}
.grouphead .dot{width:11px;height:11px;border-radius:50%;flex:none}
.grouphead .range{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;flex:none}
.grouphead .gname{flex:1;font-size:14.5px;font-weight:650;min-width:0}
.grouphead .cnt{font-size:12px;font-weight:700;color:var(--dim);background:var(--chipbg);
  border:1px solid var(--border);border-radius:999px;padding:3px 9px;flex:none}
.grouphead .chev{flex:none;color:var(--dim);transition:transform .18s}
.grouphead.open .chev{transform:rotate(90deg)}
.groupbody{display:none}
.groupbody.open{display:block;animation:slide .18s ease-out}
@keyframes slide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 4px}
#toggleall{background:transparent;border:0;color:var(--accent);font:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:4px 2px}
footer{max-width:640px;margin:26px auto 0;padding:0 16px calc(env(safe-area-inset-bottom) + 24px);
  text-align:center;font-size:11.5px;color:var(--dim);line-height:1.5}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.card:active{background:var(--card2)}
.row{display:flex;align-items:center;gap:12px}
.codebox{flex:none;width:52px;text-align:center}
.num{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
.alpha{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:1px}
.info{flex:1;min-width:0}
.name{font-size:15px;font-weight:650;line-height:1.25}
.desc{font-size:13px;color:var(--dim);margin-top:2px;line-height:1.35}
mark{background:transparent;color:var(--accent);font-weight:700}
.detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:13px;line-height:1.45}
.card.open .detail{display:block}
.detail .lbl{font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.detail .formal{color:var(--text)}
.copy{margin-top:6px;background:var(--chipbg);border:1px solid var(--border);color:var(--accent);
  font:inherit;font-size:13px;font-weight:600;padding:7px 14px;border-radius:9px;cursor:pointer}
.copy:active{background:var(--border)}
.empty{text-align:center;color:var(--dim);padding:50px 20px;font-size:15px}
.empty .big{font-size:34px;margin-bottom:10px}
</style>
</head>

<header>
  <div class="titlebar">
    <h1><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="#4da3ff"/></svg><span id="t-title">IATA Delay Codes</span></h1>

      <button id="lang-sv">SV</button><button id="lang-en">EN</button>
    </div>
  </div>
  <div class="searchwrap">
    <svg class="mag" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
    <input id="q" type="search" enterkeyhint="search" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Sök kod, ord eller orsak…" aria-label="Sök delay code">
    <button id="clear" aria-label="Rensa">✕</button>
  </div>
  <div class="chips" id="chips"></div>
</header>
<main>
  <div class="toolbar">
    <div class="count" id="count"></div>
    <button id="toggleall"></button>
  </div>
  <div id="list"></div>
</main>
<footer id="foot"></footer>

const CATS={
 "0":{sv:"Interna orsaker (flygbolag)",en:"Airline Internal",c:"var(--c90)"},
 "1":{sv:"Passagerare & bagage",en:"Passenger & Baggage",c:"var(--c10)"},
 "2":{sv:"Frakt & post",en:"Cargo & Mail",c:"var(--c20)"},
 "3":{sv:"Markhantering",en:"Ramp Handling",c:"var(--c30)"},
 "4":{sv:"Teknik",en:"Technical",c:"var(--c40)"},
 "5":{sv:"Skador & systemfel",en:"Damage & Systems",c:"var(--c50)"},
 "6":{sv:"Flygoperationer & besättning",en:"Flight Ops & Crew",c:"var(--c60)"},
 "7":{sv:"Väder",en:"Weather",c:"var(--c70)"},
 "8":{sv:"ATC & flygplats",en:"ATC & Airport",c:"var(--c80)"},
 "9":{sv:"Övrigt / Rotation",en:"Misc / Reactionary",c:"var(--c90)"}
};

const T={
 sv:{all:"Alla",search:"Sök kod, ord eller orsak…",hits:n=>n+" av "+DATA.length+" koder",
     none:"Inga träffar",tryagain:"Prova ett annat sökord eller rensa filtret.",
     other:"English",copy:"Kopiera kod",copied:"Kopierad!",
     expand:"Fäll ut alla",collapse:"Fäll ihop alla",
     formal:"Officiell IATA-definition (AHM 730)",
     notes:"Förklaring",
     foot:"IATA Delay Codes (AHM 730) · Fungerar offline · Data lagras endast på din enhet"},
 en:{all:"All",search:"Search code, word or reason…",hits:n=>n+" of "+DATA.length+" codes",
     none:"No matches",tryagain:"Try another search term or clear the filter.",
     other:"Svenska",copy:"Copy code",copied:"Copied!",
     expand:"Expand all",collapse:"Collapse all",
     formal:"Official IATA definition (AHM 730)",
     notes:"Explanation",
     foot:"IATA Delay Codes (AHM 730) · Works offline · Data stays on your device"}
};

let lang=localStorage.getItem("dc-lang")||"sv";
let cats=new Set(JSON.parse(localStorage.getItem("dc-cats")||"[]")); // valda kategorier (tomt = alla)
let query="";
let openGroups=new Set();   // utfällda kategorier (styrs bara av listan)

const norm=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
const esc=s=>s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function hl(text,q){
  if(!q) return esc(text);
  const nt=norm(text), nq=norm(q), i=nt.indexOf(nq);
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length));
}

function score(item,q){
  if(!q) return 1;
  const nq=norm(q);
  if(item.n===nq) return 1000;
  if(item.n.startsWith(nq)) return 900;
  if(norm(item.a)===nq) return 850;
  const t1=norm(item[lang]), t2=norm(lang==="sv"?item.en:item.sv);
  const d1=norm(lang==="sv"?item.dsv:item.den), d2=norm(lang==="sv"?item.den:item.dsv);
  if(t1.startsWith(nq)) return 700;
  if(t1.includes(nq)) return 600;
  if(t2.includes(nq)) return 500;
  if(d1.includes(nq)) return 400;
  if(d2.includes(nq)) return 300;
  // all words must appear somewhere
  if(norm(item.f).includes(nq)||norm(item.x).includes(nq)) return 250;
  const hay=item.n+" "+norm(item.a)+" "+t1+" "+t2+" "+d1+" "+d2+" "+norm(item.f)+" "+norm(item.x);
  const words=nq.split(/\s+/).filter(Boolean);
  if(words.length>1 && words.every(w=>hay.includes(w))) return 200;
  return 0;
}

function render(){
  const t=T[lang];
  document.getElementById("q").placeholder=t.search;
  document.getElementById("lang-sv").className=lang==="sv"?"on":"";
  document.getElementById("lang-en").className=lang==="en"?"on":"";

  // chips = filter: styr vilka kategorier som visas nedanför
  const chips=[`<button class="chip ${cats.size===0?"on":""}" data-cat="">${t.all}</button>`];
  for(const d of Object.keys(CATS)){
    const c=CATS[d];
    chips.push(`<button class="chip ${cats.has(d)?"on":""}" data-cat="${d}">
      <span class="dot" style="background:${c.c}"></span>${d}0–${d}9 · ${c[lang]}</button>`);
  }
  document.getElementById("chips").innerHTML=chips.join("");

  // filter + rank (sökning ignorerar kategorifiltret och söker bland ALLA koder)
  let items;
  if(query){
    items=DATA.map(it=>({it,s:score(it,query)})).filter(x=>x.s>0)
      .sort((a,b)=>b.s-a.s||a.it.n.localeCompare(b.it.n)).map(x=>x.it);
  }else{
    items=DATA.filter(it=>cats.size===0||cats.has(it.n[0]));
  }
  document.getElementById("count").textContent=t.hits(items.length);
  document.getElementById("foot").textContent=t.foot;
  const visible=Object.keys(CATS).filter(g=>(!cats.size||cats.has(g))&&items.some(it=>it.n[0]===g));
  const allExpanded=visible.length>0&&visible.every(g=>openGroups.has(g));
  const ta=document.getElementById("toggleall");
  ta.style.display=query?"none":"block";
  ta.textContent=allExpanded?t.collapse:t.expand;
  ta.dataset.mode=allExpanded?"collapse":"expand";

  const list=document.getElementById("list");
  if(!items.length){
    list.innerHTML=`<div class="empty"><div class="big">🔍</div><div><b>${t.none}</b></div><div>${t.tryagain}</div></div>`;
    return;
  }

  const cardHtml=it=>{
    const c=CATS[it.n[0]];
    const name=lang==="sv"?it.sv:it.en;
    // EN: officiell definition direkt på kortet. SV: svensk förklaring på kortet, officiell definition i detaljen.
    const desc=lang==="sv"?it.dsv:it.f;
    let detail="";
    if(lang==="sv") detail+=`<div class="lbl">${t.formal}</div><div class="formal">${esc(it.f)}</div>`;
    if(it.x) detail+=`<div class="lbl" style="margin-top:${lang==="sv"?"8px":"0"}">${t.notes}</div><div class="formal">${esc(it.x)}</div>`;
    return `<div class="card" data-code="${it.n}">
      <div class="row">
        <div class="codebox"><div class="num" style="color:${c.c}">${hl(it.n,query)}</div><div class="alpha">${hl(it.a,query)}</div></div>
        <div class="info">
          <div class="name">${hl(name,query)}</div>
          <div class="desc">${hl(desc,query)}</div>
        </div>
      </div>
      <div class="detail">
        ${detail}
        <button class="copy" data-copy="${it.n}">${t.copy} ${it.n}</button>
      </div>
    </div>`;
  };

  let html="";
  if(query){
    // sökläge: platt, rankad lista
    html=items.map(cardHtml).join("");
  }else{
    // kategoriläge: hopfällbara grupper
    for(const g of Object.keys(CATS)){
      if(cats.size&&!cats.has(g)) continue;
      const c=CATS[g];
      const groupItems=items.filter(it=>it.n[0]===g);
      if(!groupItems.length) continue;
      const isOpen=openGroups.has(g);
      html+=`<div class="grouphead ${isOpen?"open":""}" data-group="${g}">
        <span class="dot" style="background:${c.c}"></span>
        <span class="range" style="color:${c.c}">${g}0–${g}9</span>
        <span class="gname">${c[lang]}</span>
        <span class="cnt">${groupItems.length}</span>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 5 7 7-7 7"/></svg>
      </div>
      <div class="groupbody ${isOpen?"open":""}">${groupItems.map(cardHtml).join("")}</div>`;
    }
  }
  list.innerHTML=html;
}

// events
const q=document.getElementById("q"), clearBtn=document.getElementById("clear");
q.addEventListener("input",()=>{query=q.value.trim();clearBtn.style.display=query?"block":"none";render();});
q.addEventListener("keydown",e=>{if(e.key==="Enter")q.blur();}); // stäng tangentbordet
document.getElementById("toggleall").addEventListener("click",e=>{
  if(e.target.dataset.mode==="collapse") openGroups.clear();
  else for(const g of Object.keys(CATS)) openGroups.add(g);
  render();
});
clearBtn.addEventListener("click",()=>{q.value="";query="";clearBtn.style.display="none";render();q.focus();});
document.getElementById("chips").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b) return;
  if(b.dataset.cat===""){
    cats.clear(); // "Alla" = visa alla kategorier
  }else{
    // flerval: tryck för att visa/dölja en kategori nedanför
    if(cats.has(b.dataset.cat)) cats.delete(b.dataset.cat);
    else cats.add(b.dataset.cat);
  }
  localStorage.setItem("dc-cats",JSON.stringify([...cats])); render();
});
document.getElementById("lang-sv").addEventListener("click",()=>{lang="sv";localStorage.setItem("dc-lang",lang);render();});
document.getElementById("lang-en").addEventListener("click",()=>{lang="en";localStorage.setItem("dc-lang",lang);render();});
document.getElementById("list").addEventListener("click",e=>{
  const cp=e.target.closest(".copy");
  if(cp){
    navigator.clipboard&&navigator.clipboard.writeText(cp.dataset.copy);
    cp.textContent=T[lang].copied;
    setTimeout(()=>render(),900);
    e.stopPropagation(); return;
  }
  const gh=e.target.closest(".grouphead");
  if(gh){
    const g=gh.dataset.group;
    if(openGroups.has(g)) openGroups.delete(g); else openGroups.add(g);
    render(); return;
  }
  const card=e.target.closest(".card");
  if(card) card.classList.toggle("open");
});

render();

// offline
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
